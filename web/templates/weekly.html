{% extends "base.html" %}
{% block title %}周报{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0"><i class="bi bi-calendar-week"></i> 本周 BOSS 分析</h4>
    <form method="get" class="d-flex gap-2">
        <input type="text" name="char" class="form-control form-control-sm" placeholder="角色名（细化方案）" value="{{ char_name }}" style="width:200px">
        <button class="btn btn-sm btn-primary"><i class="bi bi-search"></i></button>
        <a href="{{ url_for('weekly') }}" class="btn btn-sm btn-outline-secondary">全部</a>
    </form>
</div>
<div class="card p-3"><div class="pre">{{ report }}</div></div>
{% endblock %}
