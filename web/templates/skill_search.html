{% extends "base.html" %}
{% block title %}技能查询{% endblock %}
{% block content %}
<h4 class="mb-3"><i class="bi bi-search"></i> 技能反向查询</h4>
<form method="get" class="mb-3">
    <div class="row g-2">
        <div class="col-md-6"><input type="text" name="q" class="form-control" placeholder="技能名" value="{{ q }}" required></div>
        <div class="col-md-3"><input type="text" name="level" class="form-control" placeholder="等级(可选)" value="{{ level }}"></div>
        <div class="col-md-3"><button class="btn btn-primary w-100"><i class="bi bi-search"></i> 查询</button></div>
    </div>
</form>
{% if q %}
<div class="card p-3"><div class="pre">{{ report if report is defined else (results if results is string else '无结果') }}</div></div>
{% endif %}
{% endblock %}
